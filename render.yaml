services:
  - type: web
    name: smart-city-map
    runtime: node
    plan: free
    buildCommand: npm install && npm install --prefix server && npm install --prefix client && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        sync: false
